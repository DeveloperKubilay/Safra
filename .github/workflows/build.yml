name: Build

on:
  workflow_dispatch:
    inputs:
      version_number:
        description: Version number
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle 9.4.0
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.0'
          cache-provider: basic

      - name: Resolve build version
        shell: bash
        run: |
          version_number="${{ github.event.inputs.version_number }}"
          if [ -z "$version_number" ]; then
            version_number="$(grep '^mod_version=' gradle.properties | cut -d= -f2-)"
            echo "GRADLE_VERSION_ARG=" >> "$GITHUB_ENV"
          else
            echo "GRADLE_VERSION_ARG=-Pmod_version=$version_number" >> "$GITHUB_ENV"
          fi
          echo "SAFRA_MOD_VERSION=$version_number" >> "$GITHUB_ENV"

      - name: Build
        run: gradle build --stacktrace $GRADLE_VERSION_ARG

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safra-build-libs-${{ env.SAFRA_MOD_VERSION }}
          path: build/libs/*
          if-no-files-found: warn
